spring:
  application:
    name: tp-adresse-test
  datasource:
    url: jdbc:sqlite:./data/adresses-france.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-timeout: 30000
  sql:
    init:
      mode: always
      schema-locations: classpath:init.sql
logging:
  level:
    root: INFO
    fr.natsystem.tp_adresse_test: INFO
batch:
  address:
    input-file: file:./data/csv/adresses-79.csv/adresses-france.csv
    chunk-size: 10000
    upsert-sql: classpath:sql/upsert-address.sql
    insert-stage-sql : classpath:sql/insert-address.sql
